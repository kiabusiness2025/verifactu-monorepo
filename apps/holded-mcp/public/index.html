<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holded MCP para Claude</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" />
    <style>
      body {
        font-family: -apple-system, sans-serif;
        background: #f5f5f0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      .card {
        background: white;
        border-radius: 12px;
        padding: 40px;
        max-width: 400px;
        width: 100%;
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
        text-align: center;
      }
      img {
        width: 64px;
        height: 64px;
        object-fit: contain;
        margin-bottom: 20px;
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        color: #111;
        margin-bottom: 8px;
      }
      p {
        color: #6b7280;
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 24px;
      }
      a {
        display: inline-block;
        padding: 10px 24px;
        background: #1d9e75;
        color: white;
        border-radius: 8px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
      }
      a:hover {
        background: #0f6e56;
      }
      .note {
        margin-top: 16px;
        font-size: 12px;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/logo.svg" alt="Holded" />
      <h1>Holded MCP Server</h1>
      <p>
        Conector oficial de Holded para Claude.<br />Conecta tu cuenta de Holded y gestiona
        facturas, contactos, proyectos y contabilidad desde Claude.
      </p>
      <a href="https://claude.ai/settings/connectors">Conectar en Claude.ai</a>
      <p class="note">
        <a href="/health" style="background: none; color: #1d9e75; padding: 0; font-weight: 400"
          >Health check</a
        >
        ·
        <a
          href="/.well-known/oauth-authorization-server"
          style="background: none; color: #1d9e75; padding: 0; font-weight: 400"
          >OAuth discovery</a
        >
      </p>
    </div>
  </body>
</html>
