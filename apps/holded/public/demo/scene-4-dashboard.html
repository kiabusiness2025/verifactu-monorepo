<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nova Gestión · Dashboard Ventas Mensual</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f14;color:#d1d5db;height:100vh;display:flex;overflow:hidden}
    .sidebar{width:252px;min-width:252px;background:#08080f;border-right:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column}
    .sb-top{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:10px}
    .sb-icon{width:32px;height:32px;background:linear-gradient(135deg,#f97316,#dc2626);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;color:white;font-weight:800;flex-shrink:0}
    .sb-name{font-size:14px;font-weight:600;color:#f3f4f6;line-height:1.3}
    .sb-sub{font-size:11px;color:#4b5563}
    .sb-label{font-size:10px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.08em;padding:16px 16px 5px}
    .sb-item{padding:8px 16px;font-size:12.5px;color:#6b7280;cursor:default;line-height:1.5}
    .sb-item.active{background:rgba(255,255,255,0.06);color:#f3f4f6}
    .chat{flex:1;display:flex;flex-direction:column;background:#111118;min-width:0}
    .chat-header{padding:14px 28px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .ch-model{font-size:13px;font-weight:600;color:#f3f4f6}
    .ch-project{font-size:11px;color:#4b5563;margin-top:2px}
    .status-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.18);color:#34d399;font-size:11px;font-weight:600;padding:4px 11px;border-radius:100px}
    .status-dot{width:5px;height:5px;background:#34d399;border-radius:50%;animation:blink-dot 2s ease-in-out infinite}
    @keyframes blink-dot{0%,100%{opacity:1}50%{opacity:.4}}
    .messages{flex:1;overflow-y:auto;padding:36px 28px;display:flex;flex-direction:column;gap:24px}
    .messages::-webkit-scrollbar{width:4px}
    .messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
    .msg-row{display:flex;gap:12px;align-items:flex-start;opacity:0;transform:translateY(6px);transition:opacity .35s ease,transform .35s ease}
    .msg-row.show{opacity:1;transform:translateY(0)}
    .msg-row.user{flex-direction:row-reverse;align-self:flex-end;max-width:580px}
    .msg-row.assistant{max-width:720px}
    .avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-top:2px}
    .avatar.u{background:#1f2937;color:#9ca3af}
    .avatar.a{background:linear-gradient(135deg,#f97316,#dc2626);color:white}
    .bubble{padding:12px 16px;font-size:14px;line-height:1.65}
    .bubble.u{background:#1f2937;color:#e5e7eb;border-radius:14px 2px 14px 14px}
    .bubble.a{background:#1a1a24;color:#d1d5db;border-radius:2px 14px 14px 14px;border:1px solid rgba(255,255,255,0.04)}
    .cursor{display:inline-block;width:2px;height:1.1em;background:currentColor;margin-left:1px;vertical-align:text-bottom;animation:blink-cur .75s step-end infinite}
    @keyframes blink-cur{0%,100%{opacity:1}50%{opacity:0}}
    .thinking-dots{display:flex;gap:5px;padding:6px 2px;align-items:center}
    .td{width:8px;height:8px;background:#4b5563;border-radius:50%;animation:td-bounce 1.5s ease-in-out infinite}
    .td:nth-child(2){animation-delay:.2s}
    .td:nth-child(3){animation-delay:.4s}
    @keyframes td-bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
    .tool-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.15);color:#f59e0b;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;opacity:0;transform:translateY(4px);transition:opacity .3s ease,transform .3s ease;margin-top:8px}
    .tool-badge.show{opacity:1;transform:translateY(0)}
    /* Response */
    .r-intro{color:#d1d5db;margin-bottom:14px;font-size:14px;line-height:1.65}
    .r-intro strong{color:#f3f4f6}
    .r-chart{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:16px 14px;margin-bottom:10px}
    .r-chart-title{font-size:10px;font-weight:700;color:#f59e0b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px}
    .r-bars{display:flex;align-items:flex-end;gap:10px;height:110px;margin-bottom:10px}
    .r-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%}
    .r-bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end}
    .r-bar{width:100%;border-radius:4px 4px 0 0;transition:height .6s ease}
    .r-bar-label{font-size:11px;color:#6b7280;font-weight:500}
    .r-bar-val{font-size:10px;color:#9ca3af;font-weight:600;text-align:center}
    .r-stats{display:flex;gap:8px;margin-bottom:10px}
    .r-stat{flex:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:8px;padding:10px 12px;text-align:center}
    .r-stat-val{font-size:17px;font-weight:700;color:#f3f4f6}
    .r-stat-lbl{font-size:11px;color:#6b7280;margin-top:2px}
    .r-note{font-size:13px;line-height:1.65;color:#9ca3af;margin-top:4px}
    .r-note strong{color:#f3f4f6}
    #overlay{position:fixed;inset:0;background:#0f0f14;opacity:0;pointer-events:none;z-index:999;transition:opacity .7s ease}
  </style>
</head>
<body>
<div id="overlay"></div>

<aside class="sidebar">
  <div class="sb-top">
    <div class="sb-icon">H</div>
    <div><div class="sb-name">Holded MCP</div><div class="sb-sub">Nova Gestión</div></div>
  </div>
  <div class="sb-label">Hoy</div>
  <div class="sb-item">Cuenta de resultados 2025</div>
  <div class="sb-item">Top clientes por ventas</div>
  <div class="sb-item">Facturas pendientes de cobro</div>
  <div class="sb-label">Ayer</div>
  <div class="sb-item active">Dashboard ventas mensual</div>
  <div class="sb-item">Borrador factura Tech Madrid</div>
  <div class="sb-item">Comparativa Q1 2024 vs 2025</div>
</aside>

<main class="chat">
  <header class="chat-header">
    <div><div class="ch-model">Claude · claude-opus-4-5</div><div class="ch-project">Nova Gestión · Holded MCP</div></div>
    <div class="status-pill"><div class="status-dot"></div>Conector activo</div>
  </header>
  <div class="messages" id="msgs"></div>
</main>

<script>
const USER_MSG = "Dame el dashboard de ventas mensuales del primer trimestre";
const TOOL_USE  = "list_documents · get_journal";

// Heights as % of max (14883)
const MONTHS = [
  { label:'Ene', val:'14.883 €', raw:14883, pct:100, color:'#f97316' },
  { label:'Feb', val:'6.958 €',  raw:6958,  pct:47,  color:'#fbbf24' },
  { label:'Mar', val:'12.826 €', raw:12826, pct:86,  color:'#f97316' },
  { label:'Abr', val:'12.403 €', raw:12403, pct:83,  color:'#fbbf24' },
];

const CHART_BLOCK = `<div class="r-chart">
  <div class="r-chart-title">📊 Ventas mensuales — Ene–Abr 2025</div>
  <div class="r-bars">
    ${MONTHS.map(m=>`<div class="r-bar-col">
      <div class="r-bar-val">${m.val}</div>
      <div class="r-bar-wrap"><div class="r-bar" style="height:${m.pct}%;background:${m.color};opacity:.85"></div></div>
      <div class="r-bar-label">${m.label}</div>
    </div>`).join('')}
  </div>
</div>`;

const BLOCKS = [
  `<div class="r-intro">Aquí tienes el <strong>dashboard de ventas mensuales</strong> de Nova Gestión para el Q1 + Abr 2025:</div>`,

  CHART_BLOCK,

  `<div class="r-stats">
    <div class="r-stat"><div class="r-stat-val">47.070 €</div><div class="r-stat-lbl">Total facturado</div></div>
    <div class="r-stat"><div class="r-stat-val">11.768 €</div><div class="r-stat-lbl">Media mensual</div></div>
    <div class="r-stat"><div class="r-stat-val">Ene 2025</div><div class="r-stat-lbl">Mejor mes</div></div>
  </div>`,

  `<div class="r-note">Febrero fue el mes más bajo (<strong>6.958 €</strong>), probablemente por menos días laborables. Marzo recuperó con fuerza hasta <strong>12.826 €</strong>. La tendencia es estable. ¿Añado la comparativa con 2024? 📈</div>`,
];

const msgs    = document.getElementById('msgs');
const overlay = document.getElementById('overlay');
const sleep   = ms => new Promise(r => setTimeout(r, ms));

async function runScene() {
  msgs.innerHTML = '';
  overlay.style.opacity = '0';
  await sleep(800);

  const uRow = document.createElement('div');
  uRow.className = 'msg-row user';
  uRow.innerHTML = '<div class="avatar u">U</div><div class="bubble u" id="ub"></div>';
  msgs.appendChild(uRow);
  await sleep(20); uRow.classList.add('show');

  const ub  = document.getElementById('ub');
  const cur = document.createElement('span');
  cur.className = 'cursor';
  ub.appendChild(cur);
  let typed = '';
  for (const ch of USER_MSG) {
    typed += ch; ub.textContent = typed; ub.appendChild(cur);
    await sleep(36 + Math.random() * 14 - 7);
  }
  cur.remove();
  await sleep(420);

  const tRow = document.createElement('div');
  tRow.className = 'msg-row assistant';
  tRow.innerHTML = `<div class="avatar a">C</div><div class="bubble a" id="tb"><div class="thinking-dots"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`;
  msgs.appendChild(tRow);
  await sleep(20); tRow.classList.add('show');
  await sleep(1900);

  const tb   = document.getElementById('tb');
  const tool = document.createElement('div');
  tool.className = 'tool-badge';
  tool.textContent = '🔌 Consultando Holded · ' + TOOL_USE;
  tb.appendChild(tool);
  await sleep(20); tool.classList.add('show');
  await sleep(1600);

  tRow.remove();
  const aRow = document.createElement('div');
  aRow.className = 'msg-row assistant';
  aRow.innerHTML = '<div class="avatar a">C</div><div class="bubble a" id="ab"></div>';
  msgs.appendChild(aRow);
  await sleep(20); aRow.classList.add('show');

  const ab = document.getElementById('ab');
  for (const html of BLOCKS) {
    const el = document.createElement('div');
    el.style.cssText = 'opacity:0;transform:translateY(6px);transition:opacity .4s ease,transform .4s ease';
    el.innerHTML = html;
    ab.appendChild(el);
    await sleep(20);
    el.style.opacity = '1'; el.style.transform = 'translateY(0)';
    await sleep(520);
  }

  await sleep(5000);
  overlay.style.opacity = '1';
  await sleep(900);
  runScene();
}

runScene();
</script>
</body>
</html>
