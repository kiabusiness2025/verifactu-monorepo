<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Intro · Holded × Claude</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    /* ── Logos row ── */
    .logos-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      will-change: transform, opacity;
    }

    #claudeWrap {
      opacity: 0;
      transform: translateX(-380px) scale(0.85);
      filter: drop-shadow(0 4px 24px rgba(217,119,87,0));
    }

    #holdedWrap {
      opacity: 0;
      transform: translateX(380px) scale(0.85);
      filter: drop-shadow(0 4px 24px rgba(255,84,96,0));
    }

    /* Connector badge */
    #connector {
      display: flex;
      align-items: center;
      gap: 0;
      opacity: 0;
      transform: scale(0.6);
      will-change: transform, opacity;
    }

    .conn-line {
      width: 28px;
      height: 2px;
      background: linear-gradient(90deg, #d97757, #ff5460);
    }

    .conn-badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d97757 0%, #ff5460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: white;
      font-weight: 800;
      box-shadow: 0 2px 16px rgba(217,119,87,0.45);
    }

    /* Glow ring — centered in logos-row */
    #glowRing {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(217,119,87,0.30) 0%,
        rgba(255,84,96,0.18) 35%,
        transparent 68%
      );
      pointer-events: none;
      opacity: 0;
    }

    /* ── Tagline ── */
    #tagline {
      text-align: center;
      opacity: 0;
      transform: translateY(14px);
      will-change: transform, opacity;
    }

    .tag-main {
      font-size: 30px;
      font-weight: 700;
      color: #0f0f14;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .tag-sub {
      font-size: 16px;
      color: #6b7280;
      margin-top: 8px;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    /* Breathing keyframe for logos once settled */
    @keyframes breathe {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.03); }
    }

    .breathing {
      animation: breathe 3.5s ease-in-out infinite;
    }

    /* Fade overlay */
    #overlay {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.8s ease;
    }
  </style>
</head>
<body>
<div id="overlay"></div>

<div class="stage">
  <div class="logos-row" id="logosRow">

    <!-- Claude logo (inline SVG) -->
    <div class="logo-wrap" id="claudeWrap">
      <svg width="84" height="84" viewBox="0 -.01 39.5 39.53" xmlns="http://www.w3.org/2000/svg">
        <path d="m7.75 26.27 7.77-4.36.13-.38-.13-.21h-.38l-1.3-.08-4.44-.12-3.85-.16-3.73-.2-.94-.2-.88-1.16.09-.58.79-.53 1.13.1 2.5.17 3.75.26 2.72.16 4.03.42h.64l.09-.26-.22-.16-.17-.16-3.88-2.63-4.2-2.78-2.2-1.6-1.19-.81-.6-.76-.26-1.66 1.08-1.19 1.45.1.37.1 1.47 1.13 3.14 2.43 4.1 3.02.6.5.24-.17.03-.12-.27-.45-2.23-4.03-2.38-4.1-1.06-1.7-.28-1.02c-.1-.42-.17-.77-.17-1.2l1.23-1.67.68-.22 1.64.22.69.6 1.02 2.33 1.65 3.67 2.56 4.99.75 1.48.4 1.37.15.42h.26v-.24l.21-2.81.39-3.45.38-4.44.13-1.25.62-1.5 1.23-.81.96.46.79 1.13-.11.73-.47 3.05-.92 4.78-.6 3.2h.35l.4-.4 1.62-2.15 2.72-3.4 1.2-1.35 1.4-1.49.9-.71h1.7l1.25 1.86-.56 1.92-1.75 2.22-1.45 1.88-2.08 2.8-1.3 2.24.12.18.31-.03 4.7-1 2.54-.46 3.03-.52 1.37.64.15.65-.54 1.33-3.24.8-3.8.76-5.66 1.34-.07.05.08.1 2.55.24 1.09.06h2.67l4.97.37 1.3.86.78 1.05-.13.8-2 1.02-2.7-.64-6.3-1.5-2.16-.54h-.3v.18l1.8 1.76 3.3 2.98 4.13 3.84.21.95-.53.75-.56-.08-3.63-2.73-1.4-1.23-3.17-2.67h-.21v.28l.73 1.07 3.86 5.8.2 1.78-.28.58-1 .35-1.1-.2-2.26-3.17-2.33-3.57-1.88-3.2-.23.13-1.11 11.95-.52.61-1.2.46-1-.76-.53-1.23.53-2.43.64-3.17.52-2.52.47-3.13.28-1.04-.02-.07-.23.03-2.36 3.24-3.59 4.85-2.84 3.04-.68.27-1.18-.61.11-1.09.66-.97 3.93-5 2.37-3.1 1.53-1.79-.01-.26h-.09l-10.44 6.78-1.86.24-.8-.75.1-1.23.38-.4 3.14-2.16z" fill="#d97757"/>
      </svg>
    </div>

    <!-- Connector -->
    <div id="connector">
      <div class="conn-line"></div>
      <div class="conn-badge">×</div>
      <div class="conn-line"></div>
    </div>

    <!-- Holded logo -->
    <div class="logo-wrap" id="holdedWrap">
      <img src="/brand/holded/holded-diamond-logo.png" width="78" height="78" alt="Holded" style="display:block">
    </div>

    <!-- Fusion glow -->
    <div id="glowRing"></div>
  </div>

  <!-- Tagline -->
  <div id="tagline">
    <div class="tag-main">Holded &times; Claude</div>
    <div class="tag-sub">Tu empresa en lenguaje natural</div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));

const claudeWrap = $('claudeWrap');
const holdedWrap = $('holdedWrap');
const connector  = $('connector');
const glowRing   = $('glowRing');
const tagline    = $('tagline');
const overlay    = $('overlay');

function setTrans(el, css) { el.style.transition = css; }

async function runIntro() {
  // ── Reset ──
  overlay.style.opacity = '0';

  claudeWrap.style.transition = 'none';
  holdedWrap.style.transition = 'none';
  connector.style.transition  = 'none';
  tagline.style.transition    = 'none';
  glowRing.style.transition   = 'none';

  claudeWrap.style.transform = 'translateX(-380px) scale(0.85)';
  claudeWrap.style.opacity   = '0';
  claudeWrap.style.filter    = 'drop-shadow(0 4px 24px rgba(217,119,87,0))';
  claudeWrap.classList.remove('breathing');

  holdedWrap.style.transform = 'translateX(380px) scale(0.85)';
  holdedWrap.style.opacity   = '0';
  holdedWrap.style.filter    = 'drop-shadow(0 4px 24px rgba(255,84,96,0))';
  holdedWrap.classList.remove('breathing');

  connector.style.opacity   = '0';
  connector.style.transform = 'scale(0.6)';

  glowRing.style.transform = 'translate(-50%,-50%) scale(0)';
  glowRing.style.opacity   = '0';

  tagline.style.opacity   = '0';
  tagline.style.transform = 'translateY(14px)';

  await sleep(650);

  // ── Phase 1: Fly in with spring ──
  setTrans(claudeWrap, 'transform 1.05s cubic-bezier(0.34,1.56,0.64,1), opacity 0.45s ease, filter 1.2s ease');
  setTrans(holdedWrap, 'transform 1.05s cubic-bezier(0.34,1.56,0.64,1), opacity 0.45s ease, filter 1.2s ease');

  claudeWrap.style.transform = 'translateX(0) scale(1)';
  claudeWrap.style.opacity   = '1';
  holdedWrap.style.transform = 'translateX(0) scale(1)';
  holdedWrap.style.opacity   = '1';

  await sleep(1050);

  // ── Phase 2: Fusion glow ──
  setTrans(glowRing, 'transform 0.45s cubic-bezier(0.22,1,0.36,1), opacity 0.35s ease');
  glowRing.style.transform = 'translate(-50%,-50%) scale(1)';
  glowRing.style.opacity   = '1';

  claudeWrap.style.filter = 'drop-shadow(0 0 18px rgba(217,119,87,0.55))';
  holdedWrap.style.filter = 'drop-shadow(0 0 18px rgba(255,84,96,0.55))';

  await sleep(480);

  // ── Phase 3: Glow fades, connector appears ──
  setTrans(glowRing, 'transform 0.6s ease, opacity 0.5s ease');
  glowRing.style.opacity = '0';

  setTrans(connector, 'opacity 0.45s ease, transform 0.45s cubic-bezier(0.34,1.56,0.64,1)');
  connector.style.opacity   = '1';
  connector.style.transform = 'scale(1)';

  claudeWrap.style.filter = 'drop-shadow(0 2px 12px rgba(217,119,87,0.20))';
  holdedWrap.style.filter = 'drop-shadow(0 2px 12px rgba(255,84,96,0.20))';

  await sleep(480);

  // ── Phase 4: Tagline ──
  setTrans(tagline, 'opacity 0.65s ease, transform 0.65s ease');
  tagline.style.opacity   = '1';
  tagline.style.transform = 'translateY(0)';

  // Subtle breathing on logos
  await sleep(300);
  claudeWrap.classList.add('breathing');
  holdedWrap.classList.add('breathing');

  // ── Phase 5: Hold ──
  await sleep(4200);

  if (window.__pipelineOnce) { window.markSceneDone(); return; }

  // ── Phase 6: Fade out ──
  overlay.style.opacity = '1';
  await sleep(1000);

  runIntro();
}

runIntro();
</script>
<script src="/demo/pipeline-utils.js"></script>
</body>
</html>
