services:
  - type: web
    name: holded-mcp-claude
    runtime: node
    plan: free
    workingDirectory: apps/holded-mcp
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: BASE_URL
        value: https://holded-mcp-claude.onrender.com
      - key: LOG_LEVEL
        value: info
