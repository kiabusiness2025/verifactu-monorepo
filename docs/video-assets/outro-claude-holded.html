<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outro — Conector Claude con Holded</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:    #D97757;
      --amber-lt: #E8A87C;
      --navy:     #1C1917;
      --shadow:   0 8px 32px rgba(217, 119, 87, 0.16);
      --card-bg:  rgba(255, 255, 255, 0.94);
    }

    html, body {
      width: 1920px; height: 1080px;
      overflow: hidden;
      font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    .bg {
      position: fixed; inset: 0;
      background: linear-gradient(140deg, #FEF9F5 0%, #FAF5EE 40%, #F5F0E8 75%, #F9F7F4 100%);
      animation: bg-fade-white 1.4s ease 6.4s forwards;
    }
    @keyframes bg-fade-white { to { background: #ffffff; } }

    .center-glow {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 320px; height: 320px; border-radius: 50%;
      background: radial-gradient(circle, rgba(217,119,87,0.18) 0%, transparent 70%);
      opacity: 0;
      animation: glow-in 1.2s ease 1.0s forwards,
                 glow-pulse 2.5s ease-in-out 2.2s infinite,
                 glow-out 0.8s ease 6.4s forwards;
    }
    @keyframes glow-in    { to   { opacity: 1; } }
    @keyframes glow-pulse {
      0%,100% { transform: translate(-50%,-50%) scale(1);    opacity: 0.7; }
      50%     { transform: translate(-50%,-50%) scale(1.15); opacity: 1;   }
    }
    @keyframes glow-out   { to { opacity: 0; } }

    .stage {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    /* Logo pair */
    .logo-pair {
      display: flex; align-items: center; gap: 28px;
      margin-bottom: 40px; opacity: 0;
      animation: pair-in 0.9s cubic-bezier(.16,1,.3,1) 0.6s forwards;
    }
    @keyframes pair-in {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }

    .logo-card {
      width: 140px; height: 140px;
      background: var(--card-bg);
      border-radius: 26px;
      box-shadow: var(--shadow), 0 2px 6px rgba(0,0,0,0.05);
      display: flex; align-items: center; justify-content: center;
    }
    .logo-card img { width: 88%; height: 88%; object-fit: contain; }
    .logo-card svg { width: 80%; height: 80%; }

    .logo-card-left  { animation: float-a 3.6s ease-in-out 1.5s infinite; }
    .logo-card-right { animation: float-b 3.6s ease-in-out 1.5s infinite; }
    @keyframes float-a { 0%,100% { transform:translateY(0);    } 50% { transform:translateY(-8px); } }
    @keyframes float-b { 0%,100% { transform:translateY(0);    } 50% { transform:translateY( 8px); } }

    /* Connector */
    .connector-wrap { display:flex; align-items:center; opacity:0; animation: conn-in 0.6s ease 1.4s forwards; }
    @keyframes conn-in { to { opacity: 1; } }

    .connector-line {
      width: 100px; height: 2px;
      background: linear-gradient(90deg, var(--amber), var(--amber-lt), var(--amber));
      border-radius: 2px; box-shadow: 0 0 12px rgba(217,119,87,0.55);
      position: relative;
    }
    .connector-dot {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 10px; height: 10px;
      border-radius: 50%; background: var(--amber);
      box-shadow: 0 0 18px rgba(217,119,87,0.9);
      animation: dot-pulse 1.6s ease-in-out 2.0s infinite;
    }
    @keyframes dot-pulse {
      0%,100% { transform:translate(-50%,-50%) scale(1);   opacity: 1;   }
      50%     { transform:translate(-50%,-50%) scale(1.9); opacity: 0.4; }
    }

    /* Text */
    .text-block { text-align:center; display:flex; flex-direction:column; align-items:center; gap:14px; }

    .main-title {
      font-size: 58px; font-weight: 800; color: var(--navy);
      letter-spacing: -0.03em; line-height: 1.05;
      opacity: 0; animation: fade-up 0.75s ease 1.8s forwards;
    }
    .main-title .a { color: var(--amber); }

    .powered-by {
      font-size: 20px; font-weight: 500; color: #78716C;
      opacity: 0; animation: fade-up 0.6s ease 2.5s forwards;
    }
    .powered-by strong { color: var(--navy); font-weight: 700; }

    .url-line {
      font-size: 15px; color: var(--amber);
      font-weight: 500; letter-spacing: 0.02em;
      opacity: 0; animation: fade-up 0.5s ease 3.2s forwards;
    }

    /* Fade-to-white veil */
    .fade-veil {
      position: fixed; inset: 0;
      background: white; opacity: 0; pointer-events: none;
      animation: veil-in 1.4s ease 6.4s forwards;
    }
    @keyframes veil-in { to { opacity: 1; } }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="center-glow"></div>

  <div class="stage">
    <div class="logo-pair">
      <!-- Claude -->
      <div class="logo-card logo-card-left">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs><linearGradient id="cg" x1="50" y1="8" x2="50" y2="92" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#D97757"/><stop offset="100%" stop-color="#C4622D"/>
          </linearGradient></defs>
          <rect x="45" y="8" width="10" height="84" rx="5" fill="url(#cg)" transform="rotate(0 50 50)"/>
          <rect x="45" y="8" width="10" height="84" rx="5" fill="url(#cg)" transform="rotate(60 50 50)"/>
          <rect x="45" y="8" width="10" height="84" rx="5" fill="url(#cg)" transform="rotate(120 50 50)"/>
          <circle cx="50" cy="50" r="7" fill="url(#cg)" opacity="0.9"/>
        </svg>
      </div>

      <div class="connector-wrap">
        <div class="connector-line">
          <div class="connector-dot"></div>
        </div>
      </div>

      <!-- Holded -->
      <div class="logo-card logo-card-right">
        <img src="../Holded logos/holded-diamond-logo.png" alt="Holded" />
      </div>
    </div>

    <div class="text-block">
      <div class="main-title">Conector <span class="a">Claude</span> con Holded</div>
      <div class="powered-by">Powered by <strong>verifactu.business</strong></div>
      <div class="url-line">claude.verifactu.business</div>
    </div>
  </div>

  <div class="fade-veil"></div>
</body>
</html>
