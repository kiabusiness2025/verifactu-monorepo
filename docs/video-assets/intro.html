<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intro — ChatGPT para Holded</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { font-size: clamp(10px, 1.35vw, 18px); }

    body {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(175deg, #ffffff 0%, #f0fdf4 100%);
      overflow: hidden;
      font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(24px, 4.5vh, 60px);
    }

    /* ─── Logo row ──────────────────────────────────────── */
    .logo-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(20px, 3vw, 48px);
    }

    /* logos share same size */
    .logo {
      width:  clamp(60px, 8vw, 116px);
      height: clamp(60px, 8vw, 116px);
      flex-shrink: 0;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /*
      ChatGPT enters from far left, drifts toward center (overlapping),
      pauses, then settles gently to the left of its final flex position.
      3 phases, single animation:
        0-60%  → enter + drift to overlap
        60-72% → hold (overlap moment)
        72-100% → settle to resting position (translateX 0)
    */
    .logo-chatgpt {
      opacity: 0;
      animation: a-chatgpt 3.4s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
    }
    @keyframes a-chatgpt {
      0%    { opacity: 0;   transform: translateX(-32vw); }
      6%    { opacity: 0; }
      60%   { opacity: 1;   transform: translateX(4.5vw); }   /* overlap */
      72%   { opacity: 1;   transform: translateX(4.5vw); }   /* hold    */
      100%  { opacity: 1;   transform: translateX(0);     }   /* settle  */
    }

    /* Holded mirrors — enters from right */
    .logo-holded {
      opacity: 0;
      animation: a-holded 3.4s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
    }
    @keyframes a-holded {
      0%    { opacity: 0;   transform: translateX(32vw); }
      6%    { opacity: 0; }
      60%   { opacity: 1;   transform: translateX(-4.5vw); }
      72%   { opacity: 1;   transform: translateX(-4.5vw); }
      100%  { opacity: 1;   transform: translateX(0);      }
    }

    /* "+" separator — visible only after settle */
    .plus {
      flex-shrink: 0;
      font-size: clamp(14px, 2vw, 28px);
      font-weight: 300;
      color: #d1d5db;
      opacity: 0;
      /* appear when logos are about 80% through their settle (0.5 + 0.78*3.4 ≈ 3.15s) */
      animation: fade-up 0.45s ease 3.15s forwards;
    }

    /* Fusion glow — radial pulse at overlap moment */
    .glow {
      position: absolute;
      width: clamp(80px, 11vw, 150px);
      height: clamp(80px, 11vw, 150px);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(16,163,127,0.22) 0%, transparent 68%);
      pointer-events: none;
      opacity: 0;
      /* peaks at overlap moment ≈ 0.5 + 0.60*3.4 = 2.54s */
      animation: glow-pulse 1.1s ease-in-out 2.3s forwards;
    }
    @keyframes glow-pulse {
      0%   { opacity: 0; transform: scale(0.35); }
      45%  { opacity: 1; transform: scale(1);    }
      100% { opacity: 0; transform: scale(1.9);  }
    }

    /* ─── Text block ────────────────────────────────────── */
    .text-block {
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      /* appears after logos settle ≈ 3.5s + small delay */
      animation: fade-up 0.8s ease-out 3.55s both;
    }

    .title {
      font-size: clamp(22px, 3.8vw, 58px);
      font-weight: 800;
      color: #0c1c50;
      letter-spacing: -0.025em;
      line-height: 1.06;
    }
    .title .green { color: #10a37f; }

    .desc {
      margin-top: clamp(10px, 1.8vh, 22px);
      font-size: clamp(9px, 1.2vw, 17px);
      color: #6b7280;
      max-width: clamp(260px, 46vw, 650px);
      line-height: 1.72;
      margin-left: auto;
      margin-right: auto;
    }

    .url {
      display: inline-block;
      margin-top: clamp(8px, 1.2vh, 14px);
      font-size: clamp(9px, 0.95vw, 14px);
      color: #10a37f;
      font-weight: 500;
      letter-spacing: 0.01em;
      opacity: 0;
      animation: fade-up 0.5s ease 4.2s forwards;
    }

    /* ─── Progress bar ──────────────────────────────────── */
    .progress {
      position: fixed;
      bottom: 7%;
      left: 50%;
      transform: translateX(-50%);
      width: clamp(100px, 18vw, 280px);
      height: 2px;
      background: #e5e7eb;
      border-radius: 2px;
      overflow: hidden;
      opacity: 0;
      animation: fade-up 0.3s ease 4.1s forwards;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #10a37f, #2361d8);
      border-radius: 2px;
      animation: fill-bar 1.9s ease 4.2s forwards;
    }

    /* ─── Shared keyframes ──────────────────────────────── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }
    @keyframes fill-bar {
      to { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Logos -->
  <div class="logo-row">
    <div class="glow"></div>

    <div class="logo logo-chatgpt">
      <img src="../OpenAI logos/Chatgpt icono 2.png" alt="ChatGPT" />
    </div>

    <span class="plus">+</span>

    <div class="logo logo-holded">
      <img src="../Holded logos/holded-diamond-logo.png" alt="Holded" />
    </div>
  </div>

  <!-- Text -->
  <div class="text-block">
    <h1 class="title"><span class="green">ChatGPT</span> para Holded</h1>
    <p class="desc">
      Conecta tu cuenta de Holded a ChatGPT y trabaja con datos reales de tu negocio en lenguaje natural. Consulta facturas, contactos, contabilidad y libro diario, y crea borradores de factura con confirmación explícita.
    </p>
    <span class="url">holded.verifactu.business/conectores/chatgpt</span>
  </div>

  <!-- Progress bar -->
  <div class="progress">
    <div class="progress-bar"></div>
  </div>

  <script>
    // Duración total: ~6.1s (4.2s inicio barra + 1.9s relleno)
    // Grabar: F11 pantalla completa → Win+Alt+R o OBS
    // Escala a cualquier resolución via clamp() + vw/vh
  </script>
</body>
</html>
