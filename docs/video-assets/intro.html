<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intro — Holded para ChatGPT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1920px;
      height: 1080px;
      background: #06112b;
      overflow: hidden;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Background glow ── */
    .bg-glow {
      position: absolute;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(35,97,216,0.18) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      animation: glow-expand 1s ease-out 1.8s forwards;
    }

    /* ── Logos container ── */
    .stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    /* ── Holded logo (left) ── */
    .logo-holded {
      position: absolute;
      left: 50%;
      transform: translateX(calc(-50% - 240px)) scale(0.6);
      opacity: 0;
      animation:
        holded-enter 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards,
        holded-merge  0.5s cubic-bezier(0.4,0,0.2,1) 1.6s forwards;
    }

    .holded-diamond {
      width: 160px;
      height: 160px;
    }

    /* ── ChatGPT logo (right) ── */
    .logo-chatgpt {
      position: absolute;
      right: 50%;
      transform: translateX(calc(50% + 240px)) scale(0.6);
      opacity: 0;
      animation:
        chatgpt-enter 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.5s forwards,
        chatgpt-merge  0.5s cubic-bezier(0.4,0,0.2,1) 1.6s forwards;
    }

    .chatgpt-circle {
      width: 160px;
      height: 160px;
      background: #10a37f;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Flash overlay ── */
    .flash {
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      animation: flash 0.4s ease-out 2.05s forwards;
    }

    /* ── Merged badge ── */
    .merged {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 24px;
      opacity: 0;
      transform: scale(0.7);
      animation: merged-appear 0.5s cubic-bezier(0.34,1.56,0.64,1) 2.3s forwards;
    }

    .merged-holded { width: 80px; height: 80px; }
    .merged-plus {
      font-size: 36px;
      font-weight: 300;
      color: rgba(255,255,255,0.4);
    }
    .merged-chatgpt {
      width: 80px;
      height: 80px;
      background: #10a37f;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Title ── */
    .title-block {
      position: absolute;
      top: 55%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 0;
      animation: title-appear 0.6s ease-out 2.7s forwards;
    }

    .title-main {
      font-size: 52px;
      font-weight: 800;
      color: white;
      letter-spacing: -1px;
      line-height: 1;
    }

    .title-sub {
      margin-top: 12px;
      font-size: 22px;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.5px;
    }

    .title-sub span {
      color: #2361d8;
    }

    /* ── Progress bar ── */
    .progress {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 320px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      opacity: 0;
      animation: progress-show 0.3s ease 2.9s forwards;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2361d8, #10a37f);
      border-radius: 2px;
      animation: progress-fill 1.5s ease 3s forwards;
    }

    /* ── Keyframes ── */
    @keyframes holded-enter {
      to { opacity: 1; transform: translateX(calc(-50% - 220px)) scale(1); }
    }
    @keyframes chatgpt-enter {
      to { opacity: 1; transform: translateX(calc(50% + 220px)) scale(1); }
    }
    @keyframes holded-merge {
      to { opacity: 0; transform: translateX(-50%) scale(0.5); }
    }
    @keyframes chatgpt-merge {
      to { opacity: 0; transform: translateX(50%) scale(0.5); }
    }
    @keyframes glow-expand {
      to { transform: translate(-50%, -50%) scale(1); }
    }
    @keyframes flash {
      0%   { opacity: 0.9; }
      100% { opacity: 0; }
    }
    @keyframes merged-appear {
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes title-appear {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes progress-show {
      to { opacity: 1; }
    }
    @keyframes progress-fill {
      to { width: 100%; }
    }
  </style>
</head>

  <div class="flash"></div>

    <!-- Holded logo entrando desde la izquierda -->
    <div class="logo-holded">

      </div>

      <span class="merged-plus">+</span>

        </svg>
      </div>
    </div>
  </div>

  <!-- Título principal -->
  <div class="title-block">
    <div class="title-main">Holded para ChatGPT</div>
    <div class="title-sub">by <span>verifactu.business</span></div>
  </div>

  <!-- Barra de progreso -->
  <div class="progress">
    <div class="progress-bar"></div>
  </div>

  <script>
