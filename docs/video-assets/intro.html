<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intro — Holded para ChatGPT</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green:  #10a37f;
      --red:    #ff5460;
      --navy:   #011c67;
      --blue:   #2361d8;
      --white:  #ffffff;
      --light:  #f0faf7;
    }

    /* Escala la raíz para que todo sea proporcional al viewport */
    html {
      font-size: clamp(10px, 1.4vw, 18px);
    }

    body {
      width: 100vw;
      height: 100vh;
      background: var(--white);
      overflow: hidden;
      font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Background: diagonal gradient que va del blanco al verde muy suave ── */
    .bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #ffffff 0%, #f0faf7 40%, #e8f7f3 70%, #ffffff 100%);
    }

    /* Glow central */
    .bg-glow {
      position: absolute;
      width: 60vw;
      height: 60vh;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(16,163,127,0.10) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      animation: glow-expand 0.9s ease-out 1.6s forwards;
    }

    /* ── Stage ── */
    .stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    /* ── Holded (enter from left) ── */
    .logo-holded {
      position: absolute;
      left: 50%;
      transform: translateX(calc(-50% - 22vw)) translateY(-12%) scale(0.7);
      opacity: 0;
      animation:
        holded-enter 0.65s cubic-bezier(0.34,1.5,0.64,1) 0.15s forwards,
        holded-merge  0.45s cubic-bezier(0.4,0,0.2,1) 1.55s forwards;
    }
    .holded-img {
      width: clamp(80px, 12vw, 180px);
      height: clamp(80px, 12vw, 180px);
      object-fit: contain;
      drop-shadow: 0 8px 24px rgba(255,84,96,0.20);
      filter: drop-shadow(0 6px 20px rgba(255,84,96,0.18));
    }

    /* ── ChatGPT (enter from right) ── */
    .logo-chatgpt {
      position: absolute;
      right: 50%;
      transform: translateX(calc(50% + 22vw)) translateY(-12%) scale(0.7);
      opacity: 0;
      animation:
        chatgpt-enter 0.65s cubic-bezier(0.34,1.5,0.64,1) 0.4s forwards,
        chatgpt-merge  0.45s cubic-bezier(0.4,0,0.2,1) 1.55s forwards;
    }
    .chatgpt-img {
      width: clamp(80px, 12vw, 180px);
      height: clamp(80px, 12vw, 180px);
      object-fit: contain;
      filter: drop-shadow(0 6px 20px rgba(16,163,127,0.20));
    }

    /* ── Flash ── */
    .flash {
      position: absolute;
      inset: 0;
      background: var(--white);
      opacity: 0;
      pointer-events: none;
      animation: flash 0.35s ease-out 1.98s forwards;
    }

    /* ── Merged row (aparece después del flash) ── */
    .merged {
      position: absolute;
      top: 38%;
      left: 50%;
      transform: translateX(-50%) scale(0.6) translateY(-50%);
      opacity: 0;
      display: flex;
      align-items: center;
      gap: clamp(10px, 1.8vw, 28px);
      animation: merged-appear 0.5s cubic-bezier(0.34,1.4,0.64,1) 2.2s forwards;
    }
    .merged-logo {
      width: clamp(42px, 5.5vw, 80px);
      height: clamp(42px, 5.5vw, 80px);
      object-fit: contain;
    }
    .merged-plus {
      font-size: clamp(20px, 2.8vw, 40px);
      font-weight: 300;
      color: #ccc;
    }

    /* ── Title ── */
    .title-block {
      position: absolute;
      top: 52%;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      text-align: center;
      opacity: 0;
      white-space: nowrap;
      animation: title-appear 0.6s ease-out 2.65s forwards;
    }
    .title-main {
      font-size: clamp(22px, 4.2vw, 68px);
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .title-main .green { color: var(--green); }
    .title-sub {
      margin-top: 0.5em;
      font-size: clamp(11px, 1.6vw, 24px);
      font-weight: 500;
      color: #888;
      letter-spacing: 0.02em;
    }
    .title-sub .brand { color: var(--blue); font-weight: 700; }

    /* ── Progress bar ── */
    .progress {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      width: clamp(160px, 24vw, 360px);
      height: 3px;
      background: #e5e7eb;
      border-radius: 2px;
      overflow: hidden;
      opacity: 0;
      animation: fade-in 0.4s ease 2.8s forwards;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green), var(--blue));
      border-radius: 2px;
      animation: progress-fill 1.4s ease 2.9s forwards;
    }

    /* ── Keyframes ── */
    @keyframes holded-enter {
      to { opacity: 1; transform: translateX(calc(-50% - 20vw)) translateY(-12%) scale(1); }
    }
    @keyframes chatgpt-enter {
      to { opacity: 1; transform: translateX(calc(50% + 20vw)) translateY(-12%) scale(1); }
    }
    @keyframes holded-merge {
      to { opacity: 0; transform: translateX(-50%) translateY(-12%) scale(0.4); }
    }
    @keyframes chatgpt-merge {
      to { opacity: 0; transform: translateX(50%) translateY(-12%) scale(0.4); }
    }
    @keyframes glow-expand {
      to { transform: translate(-50%, -50%) scale(1); }
    }
    @keyframes flash {
      0%   { opacity: 0.7; }
      100% { opacity: 0; }
    }
    @keyframes merged-appear {
      to { opacity: 1; transform: translateX(-50%) scale(1) translateY(-50%); }
    }
    @keyframes title-appear {
      from { opacity: 0; transform: translateX(-50%) translateY(18px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes fade-in {
      to { opacity: 1; }
    }
    @keyframes progress-fill {
      to { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="bg-glow"></div>
  <div class="flash"></div>

  <div class="stage">
    <!-- Holded entra desde la izquierda -->
    <div class="logo-holded">
      <img class="holded-img"
           src="../../apps/holded/public/brand/holded/holded-diamond-logo.png"
           alt="Holded" />
    </div>

    <!-- ChatGPT entra desde la derecha con logo oficial -->
    <div class="logo-chatgpt">
      <img class="chatgpt-img"
           src="../../apps/holded/public/brand/chatgpt-logo.png"
           alt="ChatGPT" />
    </div>

    <!-- Logos pequeños fusionados -->
    <div class="merged">
      <img class="merged-logo"
           src="../../apps/holded/public/brand/holded/holded-diamond-logo.png"
           alt="Holded" />
      <span class="merged-plus">+</span>
      <img class="merged-logo"
           src="../../apps/holded/public/brand/chatgpt-logo.png"
           alt="ChatGPT" />
    </div>
  </div>

  <!-- Título -->
  <div class="title-block">
    <div class="title-main">Holded para <span class="green">ChatGPT</span></div>
    <div class="title-sub">by <span class="brand">verifactu.business</span></div>
  </div>

  <!-- Barra de progreso -->
  <div class="progress">
    <div class="progress-bar"></div>
  </div>

  <script>
    // Duración total: ~4.5 s
    // Para grabar: F11 (pantalla completa) → Win+Alt+R / OBS
    // Escala automáticamente a cualquier resolución gracias a clamp() + vw/vh
  </script>
</body>
</html>
