name: Auto-Fix & Deploy

on:
  workflow_dispatch:
    inputs:
      error_context:
        description: 'Error context from monitoring'
        required: false
        type: string
      auto_fix:
        description: 'Enable automatic fixes'
        required: false
        type: boolean
        default: true
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22.x'
  PNPM_VERSION: '9.15.4'

jobs:
  detect-and-fix:
    name: Detect & Auto-Fix Errors
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --node-linker=isolated

      - name: Analyze error context from Isaak
        if: github.event.inputs.error_context != ''
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🤖 Isaak Error Analysis"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "${{ github.event.inputs.error_context }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Guardar contexto para análisis
          echo '${{ github.event.inputs.error_context }}' > error-context.json

      - name: Generate Prisma Client
        run: |
          cd apps/app
          pnpm exec prisma generate

      - name: TypeScript Type Check (App)
        id: typecheck-app
        continue-on-error: true
        run: |
          cd apps/app
          pnpm exec tsc --noEmit > typecheck-errors.log 2>&1 || true
          cat typecheck-errors.log

      - name: TypeScript Type Check (Landing)
        id: typecheck-landing
        continue-on-error: true
        run: |
          cd apps/landing
          pnpm exec tsc --noEmit > typecheck-errors.log 2>&1 || true
          cat typecheck-errors.log

      - name: ESLint Check
        id: eslint
        continue-on-error: true
        run: |
          pnpm exec eslint . --ext .ts,.tsx,.js,.jsx --max-warnings 0 || true

      - name: Build App
        run: |
          cd apps/app
          pnpm run build

      - name: Build Landing
        run: |
          cd apps/landing
          pnpm run build

      - name: Report Success Status
        if: success()
        run: |
          echo "✅ All checks passed successfully!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✓ TypeScript checks: PASSED"
          echo "✓ App build: PASSED"
          echo "✓ Landing build: PASSED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 Ready for deployment to Production"

  # deploy-vercel:
  #   Vercel deploys automatically via GitHub App integration
  #   This workflow only validates code quality
