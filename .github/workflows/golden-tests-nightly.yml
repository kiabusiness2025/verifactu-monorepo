name: Golden Tests — Nightly

# Corre la suite "golden" de Isaak (~41 tests E2E contra Anthropic Claude)
# cada noche a las 03:00 UTC. Si algo regresa, abre un issue automáticamente.
#
# También se puede disparar manualmente desde la pestaña Actions del repo.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   ANTHROPIC_API_KEY_TESTS   — API key de Anthropic, separada de la de prod
#                               (~$1.50/run, sugerencia: poner budget cap mensual)
#
# Optional secrets:
#   OPENAI_API_KEY_TESTS      — para el LLM judge (gpt-4o-mini)
#   ISAAK_GOLDEN_MODEL        — override modelo Anthropic (default: claude-sonnet-4-6)

on:
  schedule:
    # 03:00 UTC = 04:00 / 05:00 hora peninsular según horario verano/invierno
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Categoría a correr (vacío = todas)'
        type: choice
        required: false
        default: ''
        options:
          - ''
          - 'tool-use'
          - 'clarify'
          - 'no-hallucination'
          - 'multi-turn'
          - 'sub-agent'

permissions:
  contents: read
  issues: write

jobs:
  golden:
    name: Run golden suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Detecta versión de pnpm desde `packageManager` en package.json
      # (evita conflicto con la versión fijada en el monorepo).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # --no-frozen-lockfile porque main puede tener commits que avancen el
      # lock antes de que el bot pueda actualizarlo (igual que Vercel).
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @verifactu/db exec prisma generate

      # Diagnóstico: verifica que el secret está disponible (no imprime el
      # valor — solo confirma longitud, prefijo y si tiene whitespace al
      # final que se cuele al header HTTP (causa típica de 401 invalid
      # x-api-key cuando la key se pegó desde Windows con \r\n).
      - name: Check secrets and env
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TESTS }}
          ISAAK_GOLDEN_LIVE: '1'
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY_TESTS secret is empty or not set."
            echo "Add it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "ANTHROPIC_API_KEY length (raw): ${#ANTHROPIC_API_KEY}"
          echo "ANTHROPIC_API_KEY prefix: ${ANTHROPIC_API_KEY:0:8}***"
          TRIMMED=$(printf '%s' "$ANTHROPIC_API_KEY" | tr -d '[:space:]')
          echo "ANTHROPIC_API_KEY length (trimmed): ${#TRIMMED}"
          if [ "${#ANTHROPIC_API_KEY}" != "${#TRIMMED}" ]; then
            echo "::warning::La key tenía whitespace ($((${#ANTHROPIC_API_KEY} - ${#TRIMMED})) chars). Esto es probablemente la causa del 401."
          fi
          echo "ISAAK_GOLDEN_LIVE: $ISAAK_GOLDEN_LIVE"

      # Sanity check: probar la key contra Anthropic con curl ANTES de Jest.
      # Si esto falla, el problema es de la key/cuenta — no del código.
      - name: Sanity check Anthropic API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TESTS }}
        run: |
          KEY=$(printf '%s' "$ANTHROPIC_API_KEY" | tr -d '[:space:]')
          echo "Probando contra Anthropic con haiku-4-5 (1 token)…"
          RESP=$(curl -s -w "\n%{http_code}" https://api.anthropic.com/v1/messages \
            -H "x-api-key: $KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d '{"model":"claude-haiku-4-5-20251001","max_tokens":4,"messages":[{"role":"user","content":"hi"}]}')
          BODY=$(echo "$RESP" | head -n -1)
          CODE=$(echo "$RESP" | tail -n 1)
          echo "HTTP $CODE"
          # Censurar el contenido del mensaje (puede salir 1 palabra del modelo
          # — no aporta nada al diagnóstico). Imprimir solo type/error.
          echo "$BODY" | python3 -c "
          import sys, json
          try:
              d = json.loads(sys.stdin.read())
              if 'type' in d:
                  if d.get('type') == 'error':
                      print('ERROR:', d.get('error',{}).get('type'), '-', d.get('error',{}).get('message','')[:120])
                  else:
                      print('OK type=' + d.get('type','?') + ', model=' + d.get('model','?'))
          except Exception as e:
              print('Parse error:', e)
          "
          if [ "$CODE" != "200" ]; then
            echo "::error::Anthropic devolvió $CODE. La key no es válida o la cuenta no tiene billing activo."
            exit 1
          fi
          echo "::notice::API key válida. Procediendo a los golden tests."

      # Debug: imprime env vars relevantes ANTES de Jest para confirmar que
      # Jest las verá. Solo length de la API key — no el valor.
      - name: Debug Jest env
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TESTS }}
          ISAAK_GOLDEN_LIVE: '1'
        run: |
          echo "ISAAK_GOLDEN_LIVE=$ISAAK_GOLDEN_LIVE"
          echo "ANTHROPIC_API_KEY.length=${#ANTHROPIC_API_KEY}"
          node -e "console.log('Node sees: ISAAK_GOLDEN_LIVE=' + JSON.stringify(process.env.ISAAK_GOLDEN_LIVE) + ' | ANTHROPIC_API_KEY.length=' + (process.env.ANTHROPIC_API_KEY || '').length);"

      - name: Run golden tests
        id: tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TESTS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_TESTS }}
          ISAAK_GOLDEN_LIVE: '1'
          ISAAK_GOLDEN_MODEL: ${{ vars.ISAAK_GOLDEN_MODEL || '' }}
          CATEGORY: ${{ inputs.category || '' }}
        # Sin `tee` — el output va directo a GitHub Actions logs (visible en
        # la UI sin descargar artifact). Si una alternancia con `tee` fuera
        # necesaria, usar `set -o pipefail` para no enmascarar exit code.
        run: |
          cd apps/isaak
          if [ -n "$CATEGORY" ]; then
            echo "Running category: $CATEGORY"
            npx jest --config jest.config.mjs "tests/intelligence/golden/${CATEGORY}.test.ts" --verbose --no-coverage
          else
            echo "Running full suite"
            npx jest --config jest.config.mjs tests/intelligence/golden/ --verbose --no-coverage
          fi

      # Artifact opcional — el log ahora va a stdout de Actions; el artifact
      # solo se sube si hubo log en /tmp (compatibilidad con la versión previa).
      - name: Upload test log
        if: always() && hashFiles('/tmp/golden-output.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: golden-output-${{ github.run_id }}
          path: /tmp/golden-output.log
          retention-days: 14

      - name: Open issue if tests failed
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try {
              log = fs.readFileSync('/tmp/golden-output.log', 'utf8');
              // Capture failure summary — last ~80 lines should include the Jest summary
              log = log.split('\n').slice(-80).join('\n');
            } catch (e) {
              log = `(no log file)`;
            }
            const date = new Date().toISOString().slice(0, 10);
            const title = `Golden tests regressed — ${date}`;
            const body = [
              `Nightly golden tests fallaron en \`${context.sha.slice(0, 8)}\`.`,
              ``,
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `<details><summary>Últimas líneas del log</summary>`,
              ``,
              '```',
              log,
              '```',
              ``,
              `</details>`,
              ``,
              `Investigar antes del próximo release V1.x / V2.0.`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['golden-tests', 'regression'],
            });
