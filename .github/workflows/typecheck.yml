name: 🔍 TypeScript Type Check

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
  pull_request:
    branches: [main, develop]

jobs:
  typecheck-app:
    name: Type Check App
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile --node-linker=isolated

      - name: 🔍 Generate Prisma Client
        run: pnpm --filter verifactu-app run prisma:generate || pnpm --filter verifactu-app exec prisma generate

      - name: 🔍 Type check app
        run: pnpm --filter verifactu-app exec tsc --noEmit

  typecheck-landing:
    name: Type Check Landing
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile --node-linker=isolated

      - name: 🔍 Type check landing
        run: pnpm --filter verifactu-landing exec tsc --noEmit
        continue-on-error: true # Landing puede tener errores menores

  typecheck-admin:
    name: Type Check Admin
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile --node-linker=isolated

      - name: 🔍 Generate Prisma Client (db package)
        run: cd packages/db && pnpm db:generate

      - name: 🔍 Type check admin
        run: pnpm --filter verifactu-admin exec tsc --noEmit

  lint-app:
    name: Lint App
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile --node-linker=isolated

      - name: 🧹 Lint app
        run: pnpm --filter verifactu-app run lint || echo "⚠️ Lint warnings found"
        continue-on-error: true
